name: Scraper toutes les 2 heures

on:
  schedule:
    - cron: '0 */2 * * *'  # Toutes les 2 heures
  workflow_dispatch:  # Permet de lancer manuellement

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4 lxml pandas
    
    - name: Run scraper
      run: python scraper_main.py
    
    - name: Commit and push if changes
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'actions@github.com'
        git add data/offres.db
        git diff --quiet && git diff --staged --quiet || (git commit -m "Mise à jour automatique de la BDD" && git push)
