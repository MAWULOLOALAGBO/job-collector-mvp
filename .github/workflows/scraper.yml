name: Scraper toutes les 2 heures

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4 lxml pandas playwright
    
    - name: Install Playwright browsers  # NOUVEAU !
      run: |
        playwright install chromium
    
    - name: Create data directory
      run: mkdir -p data
    
    - name: Run scraper
      run: python scraper_main.py
    
    - name: List files after scraping
      run: |
        echo "Contenu du dossier data:"
        ls -la data/
        echo "Base de données existe ?"
        if [ -f data/offres.db ]; then
          echo "✅ offres.db existe"
          file data/offres.db
        else
          echo "❌ offres.db n'existe pas"
        fi
    
    - name: Commit and push
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'actions@github.com'
        git add data/offres.db || true
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update database"
        git push
